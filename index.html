        // -------------------------------------------------------------------------
        // -------------------------------------------------------------------------
        //                      ↓↓↓ 【核心渲染引擎】 ↓↓↓
        //                   (正常情况下，请不要修改以下代码)
        // -------------------------------------------------------------------------
        // -------------------------------------------------------------------------
        function renderDynamicContent(lang) {

            // 渲染兴趣
            // 圆点颜色由 bg-gray-400 改为 bg-gray-700
            // 文字大小由 text-lg 保持，颜色由 text-gray-700 保持 (与 About Me 介绍文字同色同大小)
            document.getElementById('interests-list').innerHTML = portfolioData.interests.map(item => `
                <li class="flex items-center"><span class="w-2.5 h-2.5 rounded-full bg-gray-700 mr-4"></span><span class="text-lg text-gray-700">${item[lang]}</span></li>
            `).join('');

            // 渲染教育
            document.getElementById('education-list').innerHTML = portfolioData.education.map(item => `
                <li class="flex items-start gap-6">
                    <i class="fa-solid fa-graduation-cap text-gray-400 mt-1 text-2xl"></i>
                    <div>
                        <!-- degree 字体大小与 About Me 一致(text-lg)，取消标粗(font-normal或font-medium)，颜色为黑色(text-gray-900) -->
                        <div class="text-lg font-medium text-gray-900">${item[lang].degree}</div>
                        <!-- school 字体缩小(text-base)，保持比 degree 小 -->
                        <div class="text-base text-gray-600 mt-1">${item[lang].school}</div>
                        <!-- 删除了 time 的显示 -->
                    </div>
                </li>
            `).join('');

            // 渲染经历（自动计算连线和圆点）
            document.getElementById('experience-list').innerHTML = portfolioData.experiences.map((exp, index) => {
                const isFirst = index === 0;
                const isLast = index === portfolioData.experiences.length - 1;
                const data = exp[lang];

                let linesHTML = '';
                if (portfolioData.experiences.length > 1) {
                    if (isFirst) {
                        linesHTML = `<div class="absolute left-[15px] top-1/2 -bottom-16 w-[2px] bg-blue-200 z-0"></div>`;
                    } else if (isLast) {
                        linesHTML = `<div class="absolute left-[15px] top-0 h-1/2 w-[2px] bg-blue-200 z-0"></div>`;
                    } else {
                        linesHTML = `
                            <div class="absolute left-[15px] top-0 h-1/2 w-[2px] bg-blue-200 z-0"></div>
                            <div class="absolute left-[15px] top-1/2 -bottom-16 w-[2px] bg-blue-200 z-0"></div>
                        `;
                    }
                }

                const circleClass = exp.isCurrent ? "bg-blue-500" : "bg-white border-2 border-blue-500";

                // lg:-ml-[64px] 是经过精密计算的，用来将文字左侧死死对齐到 logo 的垂直中心
                // org: 颜色变回 text-gray-900，取消加粗，大小 text-lg
                // role: 大小变 text-xl，颜色 text-gray-500
                // desc: 字体变小为 text-base
                return `
                    <div class="relative pl-12 md:pl-16 group">
                        ${linesHTML}
                        <div class="absolute left-[8px] top-1/2 -translate-y-1/2 w-4 h-4 ${circleClass} rounded-full ring-4 ring-gray-100 z-10"></div>
                        <div class="bg-white p-8 md:p-10 rounded-xl border border-gray-200/60 shadow-md hover:shadow-xl hover:-translate-y-1 transition-all duration-300 ease-out will-change-transform">
                            <div class="flex flex-col lg:flex-row gap-6 lg:gap-8 items-center lg:items-start">
                                <div class="hidden lg:block flex-shrink-0 pt-1.5">
                                    <img src="${exp.logo}" alt="Logo" class="w-16 h-16 rounded-full object-cover border border-gray-200 shadow-sm bg-white">
                                </div>
                                <div class="flex-1 w-full text-left">
                                    <div class="flex flex-col lg:flex-row justify-between items-start lg:items-center mb-2">
                                        <h3 class="text-xl font-bold text-gray-500">${data.role}</h3>
                                        <div class="text-base text-gray-500 font-medium mt-1 lg:mt-0">${data.time}</div>
                                    </div>
                                    <div class="text-lg text-gray-900 mb-3">${data.org}</div>
                                    <ul class="list-disc list-outside ml-6 lg:-ml-[64px] text-gray-600 space-y-1.5 text-base leading-relaxed mt-4">
                                        ${data.desc.map(d => `<li>${d}</li>`).join('')}
                                    </ul>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            // 渲染项目
            document.getElementById('projects-list').innerHTML = portfolioData.projects.map(proj => {
                const data = proj[lang];
                const tagsHTML = proj.tags.map(tag => `<span class="bg-gray-50 border border-gray-200 px-4 py-2 rounded-full shadow-sm">${tag}</span>`).join('');
                return `
                    <div class="flex flex-col lg:flex-row gap-12 items-center group">
                        <div class="order-1 lg:w-2/5 w-full flex-shrink-0 relative overflow-hidden rounded-xl shadow-md cursor-pointer hover:shadow-xl transition-shadow" onclick="openLightbox('${proj.img}')">
                            <img src="${proj.img}" alt="Project" class="w-full h-auto object-cover hover:scale-105 transition-transform duration-500 bg-white">
                        </div>
                        <div class="order-2 lg:w-3/5 w-full text-left">
                            <h3 class="text-2xl font-semibold text-gray-900 mb-5">${data.title}</h3>
                            <p class="text-gray-700 mb-6 text-base leading-relaxed">${data.desc}</p>
                            <div class="flex flex-wrap gap-3 text-sm font-semibold text-gray-600 mt-2">
                                ${tagsHTML}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            // 渲染出版物
            // 字体大小调整为 text-lg
            document.getElementById('publications-list').innerHTML = portfolioData.publications.map(pub => `
                <li class="text-lg">
                    <span>${pub[lang].text}</span>
                    <a href="${pub[lang].link}" target="_blank" class="text-blue-500 hover:text-blue-700 underline break-all">${pub[lang].link}</a>
                </li>
            `).join('');

            // 渲染奖项
            // 字体大小调整为 text-lg
            // 取消标点和前面的小圆点已在 HTML 结构(list-none)和数据中处理
            document.getElementById('awards-list').innerHTML = portfolioData.awards.map(award => `
                <li class="text-lg"><span>${award[lang].name}</span> <span class="text-gray-500">${award[lang].desc}</span></li>
            `).join('');
        }

        function setLang(lang) {
            // 替换静态文字
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (staticTexts[lang][key]) {
                    el.innerHTML = staticTexts[lang][key];
                }
            });

            // 执行自动排版渲染
            renderDynamicContent(lang);

            // 按钮高亮切换
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.remove('text-white', 'font-bold');
                btn.classList.add('text-gray-400');
            });
            const activeBtn = document.getElementById('btn-' + lang);
            if (activeBtn) {
                activeBtn.classList.remove('text-gray-400');
                activeBtn.classList.add('text-white', 'font-bold');
            }
        }

        // =========================================================================
        // 杂项功能（放大图片、滚动高亮等）
        // =========================================================================
        function openLightbox(imageSrc) {
            const lightbox = document.getElementById('lightbox');
            document.getElementById('lightbox-img').src = imageSrc;
            lightbox.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }
        function closeLightbox() {
            document.getElementById('lightbox').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        document.addEventListener('DOMContentLoaded', () => {
            const sections = document.querySelectorAll('section');
            const navLinks = document.querySelectorAll('.sidebar-link');
            const scrollTopBtn = document.getElementById('scrollTopBtn');

            window.addEventListener('scroll', () => {
                let current = '';
                sections.forEach(section => {
                    if (pageYOffset >= (section.offsetTop - 100)) {
                        current = section.getAttribute('id');
                    }
                });
                navLinks.forEach(link => {
                    link.classList.remove('active');
                    if (link.getAttribute('href').includes(current)) {
                        link.classList.add('active');
                    }
                });
                if (window.pageYOffset > 300) {
                    scrollTopBtn.classList.remove('opacity-0', 'pointer-events-none', 'translate-y-4');
                    scrollTopBtn.classList.add('opacity-100', 'pointer-events-auto', 'translate-y-0');
                } else {
                    scrollTopBtn.classList.add('opacity-0', 'pointer-events-none', 'translate-y-4');
                    scrollTopBtn.classList.remove('opacity-100', 'pointer-events-auto', 'translate-y-0');
                }
            });
            setLang('en');
        });
        function scrollToTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); }
    </script>
